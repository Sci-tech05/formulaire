{% extends "admin/base.html" %}
{% load static %}

{% block title %}{{ title }} | Masterclass Admin{% endblock %}

{% block branding %}
<h1 id="site-name">
    <a href="{% url 'admin:index' %}" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
        <img src="{% static 'img/logo.png' %}" alt="Logo" height="36" style="vertical-align:middle;">
        Masterclass 2026
    </a>
</h1>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<link rel="stylesheet" href="{% static 'admin/css/custom.css' %}">
{% endblock %}

{% block sidebar %}
{{ block.super }}
<div id="sidebar-logout">
    <a href="{% url 'admin:logout' %}" class="sidebar-logout-btn">
        <span class="sidebar-logout-icon">&#x2192;</span>
        Se déconnecter
    </a>
</div>
{% endblock %}
