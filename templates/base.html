<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Masterclass – Étudiant Entrepreneur{% endblock %}</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />

    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        [x-cloak] {
            display: none !important;
        }

        .form-field {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            border: 1px solid #e5e7eb;
            background-color: #ffffff;
            color: #111827;
            font-size: 0.875rem;
            transition: all 150ms ease;
            outline: none;
        }

        .form-field::placeholder {
            color: #9ca3af;
        }

        .form-field:focus {
            outline: none;
            box-shadow: 0 0 0 2px #3b82f6;
            border-color: transparent;
        }

        .form-field:hover {
            border-color: #93c5fd;
        }

        /* Phone field with flag prefix */
        .phone-field-wrapper {
            position: relative;
        }

        .phone-field-wrapper .form-field {
            padding-left: 3.75rem !important;
        }

        .phone-flag {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 0.8rem;
            border-right: 1px solid #e5e7eb;
            pointer-events: none;
            font-size: 1.1rem;
            line-height: 1;
            z-index: 1;
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 font-sans antialiased">

    {% block body %}{% endblock %}

    <!-- Toast notifications -->
    {% if messages %}
    <div x-data="{ show: true }" x-init="setTimeout(() => show = false, 5000)" x-show="show"
        x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-4"
        x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0" x-cloak
        class="fixed bottom-6 right-6 z-50 space-y-3 max-w-sm">
        {% for message in messages %}
        <div class="flex items-start gap-3 px-4 py-3 rounded-xl shadow-lg border
      {% if message.tags == 'success' %}bg-green-50 border-green-200 text-green-800
      {% elif message.tags == 'error' %}bg-red-50 border-red-200 text-red-800
      {% else %}bg-blue-50 border-blue-200 text-blue-800{% endif %}">
            <span class="text-lg leading-none mt-0.5">
                {% if message.tags == 'success' %}✅{% elif message.tags == 'error' %}❌{% else %}ℹ️{% endif %}
            </span>
            <p class="text-sm font-medium">{{ message }}</p>
            <button @click="show = false" class="ml-auto text-gray-400 hover:text-gray-600">✕</button>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    {% block extra_js %}{% endblock %}
</body>

</html>
